<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章详情 — NewsHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-heading: 'Outfit', system-ui, sans-serif;
      --font-body: 'Noto Sans SC', sans-serif;
      --color-accent: #c7512e;
      --color-accent-hover: #a84324;
      --color-accent-light: #fdf0eb;
      --color-bg: #f8f7f4;
      --color-surface: #ffffff;
      --color-border: #e8e5df;
      --color-text: #2c2c2c;
      --color-text-secondary: #6b6b6b;
      --color-text-muted: #9b9b9b;
      --color-overlay: rgba(0,0,0,0.04);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.08);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --transition: 200ms ease;
    }
    [data-theme="dark"] {
      --color-bg: #1a1a1a;
      --color-surface: #242424;
      --color-border: #333333;
      --color-text: #e4e4e4;
      --color-text-secondary: #a0a0a0;
      --color-text-muted: #707070;
      --color-overlay: rgba(255,255,255,0.03);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.7;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Navbar ─── */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
    }
    .navbar-inner {
      max-width: 1340px; margin: 0 auto;
      padding: 0 24px; height: 60px;
      display: flex; align-items: center; gap: 16px;
    }
    .navbar-logo {
      font-family: var(--font-heading); font-size: 1.35rem; font-weight: 700;
      color: var(--color-text); text-decoration: none;
      display: flex; align-items: center; gap: 8px;
    }
    .navbar-logo .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--color-accent); }
    .navbar-back {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.85rem; color: var(--color-text-secondary);
      text-decoration: none; padding: 6px 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--color-border); background: none;
      cursor: pointer; transition: var(--transition); white-space: nowrap;
    }
    .navbar-back:hover { border-color: var(--color-accent); color: var(--color-accent); }
    .theme-toggle {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid var(--color-border);
      background: var(--color-surface); color: var(--color-text-secondary);
      cursor: pointer; font-size: 1rem; margin-left: auto;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
    }
    .theme-toggle:hover { border-color: var(--color-accent); color: var(--color-accent); }
    .btn-login {
      font-family: var(--font-body); font-size: 0.85rem; font-weight: 500;
      padding: 8px 20px; border-radius: 20px;
      background: var(--color-accent); color: #fff; border: none;
      cursor: pointer; text-decoration: none; transition: var(--transition);
    }
    .btn-login:hover { background: var(--color-accent-hover); }

    /* ─── Layout ─── */
    .page-layout {
      max-width: 1340px; margin: 32px auto 0; padding: 0 24px;
      display: grid; grid-template-columns: 1fr 320px; gap: 32px;
      align-items: start;
    }

    /* ─── Article Main ─── */
    .article-main {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    /* Hero Image */
    .article-hero {
      width: 100%; height: 420px;
      background-size: cover; background-position: center;
      background-color: var(--color-overlay);
      display: none;
    }
    .article-hero.visible { display: block; }

    /* Meta Header */
    .article-header { padding: 40px 56px 0; }
    .article-breadcrumb {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.8rem; color: var(--color-text-muted); margin-bottom: 20px;
    }
    .article-breadcrumb a { color: var(--color-accent); text-decoration: none; }
    .article-breadcrumb a:hover { text-decoration: underline; }
    .article-breadcrumb .sep { color: var(--color-border); }
    .article-tags { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .article-tag {
      font-size: 0.75rem; font-weight: 500; padding: 4px 12px; border-radius: 4px;
      background: var(--color-accent-light); color: var(--color-accent);
    }
    .article-tag.sub { background: var(--color-bg); color: var(--color-text-secondary); }
    .article-title {
      font-family: var(--font-heading); font-size: 2.2rem; font-weight: 700;
      color: var(--color-text); line-height: 1.3; margin-bottom: 20px;
    }
    .article-excerpt {
      font-size: 1rem; color: var(--color-text-secondary); line-height: 1.8;
      padding: 16px 20px; background: var(--color-bg);
      border-left: 3px solid var(--color-accent); border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin-bottom: 24px;
    }
    .article-meta {
      display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
      padding-bottom: 24px; border-bottom: 1px solid var(--color-border);
      font-size: 0.85rem; color: var(--color-text-muted);
    }
    .article-meta span { display: flex; align-items: center; gap: 6px; }
    .article-author {
      font-weight: 600; color: var(--color-text-secondary);
    }

    /* Article Content */
    .article-body {
      padding: 40px 56px 56px;
      font-size: 1.05rem; line-height: 1.9; color: var(--color-text);
    }
    .article-body h2 {
      font-family: var(--font-heading); font-size: 1.4rem; font-weight: 700;
      color: var(--color-text); margin: 40px 0 16px;
      padding-bottom: 10px; border-bottom: 2px solid var(--color-accent);
    }
    .article-body h3 {
      font-family: var(--font-heading); font-size: 1.15rem; font-weight: 600;
      color: var(--color-text); margin: 28px 0 12px;
    }
    .article-body p {
      margin-bottom: 20px; text-indent: 2em;
    }
    .article-body ul, .article-body ol {
      margin: 0 0 20px 2em; padding: 0;
    }
    .article-body li { margin-bottom: 8px; }
    .article-body blockquote {
      border-left: 3px solid var(--color-accent);
      margin: 24px 0; padding: 16px 20px;
      background: var(--color-bg);
      color: var(--color-text-secondary); font-style: italic;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }
    .article-body a { color: var(--color-accent); text-decoration: none; }
    .article-body a:hover { text-decoration: underline; }

    /* No content placeholder */
    .article-no-content {
      text-align: center; padding: 80px 40px;
      color: var(--color-text-muted); font-size: 1rem;
    }
    .article-no-content .icon { font-size: 3rem; display: block; margin-bottom: 16px; opacity: 0.4; }

    /* Article Footer */
    .article-footer {
      padding: 24px 56px;
      border-top: 1px solid var(--color-border);
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
    }
    .article-share { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; color: var(--color-text-muted); }
    .share-btn {
      padding: 6px 16px; border-radius: var(--radius-sm);
      border: 1px solid var(--color-border); background: var(--color-surface);
      font-size: 0.8rem; color: var(--color-text-secondary);
      cursor: pointer; transition: var(--transition);
    }
    .share-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }
    .article-nav {
      display: flex; gap: 12px;
    }
    .nav-btn {
      padding: 8px 20px; border-radius: var(--radius-sm);
      border: 1px solid var(--color-border); background: var(--color-surface);
      font-family: var(--font-body); font-size: 0.85rem; color: var(--color-text-secondary);
      cursor: pointer; text-decoration: none; transition: var(--transition);
    }
    .nav-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }
    .nav-btn.primary { background: var(--color-accent); color: #fff; border-color: var(--color-accent); }
    .nav-btn.primary:hover { background: var(--color-accent-hover); }

    /* ─── Sidebar ─── */
    .article-sidebar { display: flex; flex-direction: column; gap: 20px; }

    /* Author Card */
    .sidebar-card {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-md); overflow: hidden;
    }
    .sidebar-card-header {
      padding: 16px 20px 12px;
      font-family: var(--font-heading); font-size: 0.8rem; font-weight: 600;
      letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--color-text-secondary); border-bottom: 1px solid var(--color-border);
    }
    .sidebar-card-body { padding: 16px 20px; }

    /* Author */
    .author-info { display: flex; gap: 14px; align-items: center; }
    .author-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--color-accent-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; flex-shrink: 0;
    }
    .author-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; }
    .author-desc { font-size: 0.8rem; color: var(--color-text-muted); }

    /* Related */
    .related-list { display: flex; flex-direction: column; gap: 2px; }
    .related-item {
      display: flex; gap: 12px; padding: 10px 0;
      border-bottom: 1px solid var(--color-border); text-decoration: none; color: inherit;
      transition: var(--transition); cursor: pointer;
    }
    .related-item:last-child { border-bottom: none; }
    .related-item:hover .related-title { color: var(--color-accent); }
    .related-item .related-cover {
      width: 64px; height: 48px; border-radius: var(--radius-sm);
      background-size: cover; background-position: center;
      background-color: var(--color-overlay); flex-shrink: 0;
    }
    .related-item .related-cover-placeholder {
      width: 64px; height: 48px; border-radius: var(--radius-sm);
      background: var(--color-overlay); display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
    }
    .related-item .related-info { min-width: 0; }
    .related-item .related-title {
      font-size: 0.82rem; font-weight: 500; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; transition: var(--transition);
    }
    .related-item .related-meta { font-size: 0.72rem; color: var(--color-text-muted); margin-top: 4px; }

    /* Hot list */
    .hot-item { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--color-border); cursor: pointer; transition: var(--transition); }
    .hot-item:last-child { border-bottom: none; }
    .hot-item:hover .hot-title { color: var(--color-accent); }
    .hot-rank {
      font-family: var(--font-heading); font-size: 1rem; font-weight: 700;
      width: 26px; flex-shrink: 0; color: var(--color-text-muted);
    }
    .hot-item:nth-child(1) .hot-rank { color: #e74c3c; }
    .hot-item:nth-child(2) .hot-rank { color: #e67e22; }
    .hot-item:nth-child(3) .hot-rank { color: #f1c40f; }
    .hot-title { font-size: 0.82rem; font-weight: 500; line-height: 1.4; transition: var(--transition); }
    .hot-views { font-size: 0.7rem; color: var(--color-text-muted); margin-top: 3px; }

    /* ─── Loading ─── */
    .loading-screen {
      min-height: 60vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      color: var(--color-text-muted);
    }
    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid var(--color-border);
      border-top-color: var(--color-accent);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-screen {
      min-height: 60vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      color: var(--color-text-muted); text-align: center;
    }
    .error-screen .icon { font-size: 3rem; opacity: 0.4; }

    /* ─── Responsive ─── */
    @media (max-width: 900px) {
      .page-layout { grid-template-columns: 1fr; }
      .article-sidebar { display: none; }
    }
    @media (max-width: 600px) {
      .article-header { padding: 24px 24px 0; }
      .article-body { padding: 24px 24px 40px; font-size: 1rem; }
      .article-footer { padding: 20px 24px; flex-direction: column; align-items: flex-start; }
      .article-title { font-size: 1.6rem; }
      .article-hero { height: 240px; }
    }
  </style>
</head>
<body>

<!-- ─── Navbar ─── -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="news.html" class="navbar-logo"><span class="dot"></span>NewsHub</a>
    <a href="news.html" class="navbar-back">← 返回首页</a>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
    <a href="login.html" class="btn-login">后台管理</a>
  </div>
</nav>

<!-- ─── Page Layout ─── -->
<div class="page-layout" id="pageLayout">

  <!-- Left: Article -->
  <main id="articleMain">
    <div class="loading-screen" id="loadingScreen">
      <div class="spinner"></div>
      <span>加载文章中...</span>
    </div>
  </main>

  <!-- Right: Sidebar -->
  <aside class="article-sidebar" id="sidebar" style="display:none">

    <div class="sidebar-card" id="authorCard" style="display:none">
      <div class="sidebar-card-header">✍ 作者</div>
      <div class="sidebar-card-body">
        <div class="author-info">
          <div class="author-avatar" id="authorAvatar">👤</div>
          <div>
            <div class="author-name" id="authorName">—</div>
            <div class="author-desc">NewsHub 特约记者</div>
          </div>
        </div>
      </div>
    </div>

    <div class="sidebar-card" id="relatedCard">
      <div class="sidebar-card-header">📎 相关文章</div>
      <div class="sidebar-card-body">
        <div class="related-list" id="relatedList">
          <div style="color:var(--color-text-muted);font-size:0.85rem;padding:8px 0">加载中...</div>
        </div>
      </div>
    </div>

    <div class="sidebar-card" id="hotCard">
      <div class="sidebar-card-header">🔥 热门排行</div>
      <div class="sidebar-card-body">
        <div id="hotList">
          <div style="color:var(--color-text-muted);font-size:0.85rem;padding:8px 0">加载中...</div>
        </div>
      </div>
    </div>

  </aside>
</div>

<script>
const API = '/api';
let articleData = null;

// ─── Init ───
(async function() {
  setupTheme();
  const id = getArticleId();
  if (!id) return showError('未找到文章 ID，请从首页进入');

  const [article] = await Promise.all([
    loadArticle(id),
    loadHot()
  ]);

  if (article) {
    document.title = article.title + ' — NewsHub';
    await loadRelated(article.category, article.id);
  }
})();

function getArticleId() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id');
}

// ─── Theme ───
function setupTheme() {
  const saved = localStorage.getItem('newshub-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  updateThemeToggle(saved);
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('newshub-theme', next);
  updateThemeToggle(next);
}
function updateThemeToggle(theme) {
  document.getElementById('themeToggle').textContent = theme === 'light' ? '🌙' : '☀️';
}

// ─── API ───
async function apiFetch(path) {
  try {
    const res = await fetch(API + path);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch(e) {
    console.error('API error:', path, e);
    return null;
  }
}

// ─── Load Article ───
async function loadArticle(id) {
  const res = await apiFetch(`/articles/${id}`);
  if (!res || !res.success || !res.data) {
    showError('文章不存在或已被删除');
    return null;
  }

  articleData = res.data;
  renderArticle(articleData);

  // Show sidebar
  document.getElementById('sidebar').style.display = 'flex';

  return articleData;
}

function renderArticle(a) {
  const container = document.getElementById('articleMain');

  // Breadcrumb
  const breadcrumb = `
    <div class="article-breadcrumb">
      <a href="news.html">首页</a>
      <span class="sep">›</span>
      <a href="news.html?category=${encodeURIComponent(a.category)}">${escapeHtml(a.category)}</a>
      ${a.sub_category ? `<span class="sep">›</span><span>${escapeHtml(a.sub_category)}</span>` : ''}
    </div>`;

  // Tags
  const tags = `
    <div class="article-tags">
      <span class="article-tag">${escapeHtml(a.category)}</span>
      ${a.sub_category ? `<span class="article-tag sub">${escapeHtml(a.sub_category)}</span>` : ''}
    </div>`;

  // Meta
  const meta = `
    <div class="article-meta">
      <span><span class="article-author">✍ ${escapeHtml(a.author || 'NewsHub')}</span></span>
      <span>📅 ${formatDate(a.created_at)}</span>
      <span>👁 ${formatNum(a.views)} 阅读</span>
      <span>💬 ${a.comments_count || 0} 评论</span>
    </div>`;

  // Excerpt
  const excerpt = a.excerpt
    ? `<div class="article-excerpt">${escapeHtml(a.excerpt)}</div>`
    : '';

  // Content
  let contentHtml;
  if (a.content) {
    // Content is HTML — render directly (trusted source: our own backend)
    contentHtml = `<div class="article-body">${a.content}</div>`;
  } else {
    contentHtml = `<div class="article-no-content"><span class="icon">📄</span>文章正文暂未录入，敬请期待。</div>`;
  }

  // Footer
  const footer = `
    <div class="article-footer">
      <div class="article-share">
        <span>分享：</span>
        <button class="share-btn" onclick="copyLink()">🔗 复制链接</button>
      </div>
      <div class="article-nav">
        <a href="news.html" class="nav-btn">← 返回列表</a>
      </div>
    </div>`;

  // Hero image
  const heroStyle = a.cover_url ? `background-image:url('${a.cover_url}')` : '';
  const heroVisible = a.cover_url ? 'visible' : '';

  container.innerHTML = `
    <article class="article-main">
      <div class="article-hero ${heroVisible}" style="${heroStyle}"></div>
      <div class="article-header">
        ${breadcrumb}
        ${tags}
        <h1 class="article-title">${escapeHtml(a.title)}</h1>
        ${excerpt}
        ${meta}
      </div>
      ${contentHtml}
      ${footer}
    </article>`;

  // Update author card
  if (a.author) {
    document.getElementById('authorName').textContent = a.author;
    document.getElementById('authorAvatar').textContent = a.author.charAt(0);
    document.getElementById('authorCard').style.display = 'block';
  }
}

// ─── Related Articles ───
async function loadRelated(category, currentId) {
  const res = await apiFetch(`/articles?public=1&category=${encodeURIComponent(category)}&limit=5`);
  const articles = (res?.articles || []).filter(a => a.id !== parseInt(currentId));
  const container = document.getElementById('relatedList');

  if (articles.length === 0) {
    container.innerHTML = '<div style="color:var(--color-text-muted);font-size:0.82rem;padding:8px 0">暂无相关文章</div>';
    return;
  }

  container.innerHTML = articles.slice(0, 4).map(a => `
    <div class="related-item" onclick="goToArticle(${a.id})">
      ${a.cover_url
        ? `<div class="related-cover" style="background-image:url('${a.cover_url}')"></div>`
        : `<div class="related-cover-placeholder">📰</div>`
      }
      <div class="related-info">
        <div class="related-title">${escapeHtml(a.title)}</div>
        <div class="related-meta">👁 ${formatNum(a.views)} · ${formatDate(a.created_at)}</div>
      </div>
    </div>
  `).join('');
}

// ─── Hot Articles ───
async function loadHot() {
  const res = await apiFetch('/articles/hot');
  const articles = res?.data || [];
  const container = document.getElementById('hotList');

  container.innerHTML = articles.map((a, i) => `
    <div class="hot-item" onclick="goToArticle(${a.id})">
      <div class="hot-rank">${String(i+1).padStart(2,'0')}</div>
      <div>
        <div class="hot-title">${escapeHtml(a.title)}</div>
        <div class="hot-views">👁 ${formatNum(a.views)} 阅读</div>
      </div>
    </div>
  `).join('');
}

// ─── Navigation ───
function goToArticle(id) {
  window.location.href = `article.html?id=${id}`;
}

// ─── Share ───
function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const btn = document.querySelector('.share-btn');
    if (btn) { btn.textContent = '✅ 已复制'; setTimeout(() => { btn.textContent = '🔗 复制链接'; }, 2000); }
  });
}

// ─── Error ───
function showError(msg) {
  document.getElementById('articleMain').innerHTML = `
    <div class="article-main">
      <div class="error-screen">
        <span class="icon">😕</span>
        <p>${msg}</p>
        <a href="news.html" style="color:var(--color-accent);margin-top:8px">← 返回首页</a>
      </div>
    </div>`;
}

// ─── Utils ───
function escapeHtml(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
function formatNum(n) {
  if (!n) return '0';
  if (n >= 10000) return (n/10000).toFixed(1) + '万';
  return n.toLocaleString();
}
function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  const now = new Date();
  const diff = now - dt;
  if (diff < 3600000) return Math.floor(diff/60000) + '分钟前';
  if (diff < 86400000) return Math.floor(diff/3600000) + '小时前';
  if (diff < 604800000) return Math.floor(diff/86400000) + '天前';
  return dt.toLocaleDateString('zh-CN', { year:'numeric', month:'short', day:'numeric' });
}
